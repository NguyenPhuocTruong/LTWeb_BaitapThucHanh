<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <link rel="stylesheet" href="register.css">
</head>
<body>
    <h1>Register</h1>
    <form action="">
        <div><div class="label">Full Name</div><div class="input"><input type="text" name="fullname" placeholder="Enter Your Full Name"></div></div>
        <div><div class="label">Email</div><div class="input"><input type="email" name="email" placeholder="Enter Your Email"></div></div>
        <div><div class="label">Password</div><div class="input"><input type="password" name="pass" placeholder="Enter Password"></div></div>
        <div><div class="label">Repeat Password</div><div class="input"><input type="password" name="repeated_pass" placeholder="Repeat Password"></div></div>
        <div><div class="label">Date of Birth</div><div class="input"><input type="date" name="birthday"></div></div>
        <div><div class="input"><div class="radio">Male<input type="radio" name="gender" value="male"> Female<input type="radio" name="gender" value="female"></div></div></div>
        <div class="handle"><input type="reset" value="Reset"><input type="submit" value="Submit"></div>
    </form>
</body>
</html>
